<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Ad diagnostic sandbox</title>
    <link rel="stylesheet" href="./shared/ui.css" />
    <style>
      .authWrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .authCard {
        width: min(400px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      .authCard h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 900;
      }
      .authCard .note {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 20px;
        line-height: 1.45;
      }
      .authCard label {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: #374151;
        margin-bottom: 6px;
      }
      .authCard input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 14px;
        box-sizing: border-box;
      }
      .authCard input:focus {
        outline: none;
        border-color: var(--green-600);
        box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.2);
      }
      .authCard button[type="submit"] {
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--green-700);
        color: #fff;
        font-weight: 900;
        font-size: 14px;
        cursor: pointer;
      }
      .authCard button[type="submit"]:hover {
        background: var(--green-800);
      }
      .authErr {
        display: none;
        font-size: 13px;
        color: #b91c1c;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 14px;
      }
      .authErr.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Credentials are visible in page source: use only as a casual gate, not real security. -->
    <div class="authWrap">
      <div class="authCard">
        <h1>Sign in</h1>
        <p class="note">Ad diagnostic sandbox. Session ends when you close the browser tab.</p>
        <div id="authErr" class="authErr" role="alert">Invalid login or password.</div>
        <form id="authForm" autocomplete="off">
          <label for="authLogin">Login</label>
          <input id="authLogin" name="login" type="text" required autocomplete="username" />
          <label for="authPass">Password</label>
          <input id="authPass" name="password" type="password" required autocomplete="current-password" />
          <button type="submit">Continue</button>
        </form>
      </div>
    </div>
    <script>
      (function () {
        var EXPECTED_LOGIN = "eP2&al9$kw7*bjT#xyW@";
        var EXPECTED_PASSWORD = "oN5#awB8ecF3%zdX0_bj";
        var form = document.getElementById("authForm");
        var err = document.getElementById("authErr");
        function safeNext(raw) {
          if (!raw || typeof raw !== "string") return "index.html";
          if (raw.indexOf("http://") === 0 || raw.indexOf("https://") === 0) return "index.html";
          if (raw.indexOf("//") === 0) return "index.html";
          if (raw.indexOf("..") !== -1) return "index.html";
          if (raw.charAt(0) === "/") return "index.html";
          if (raw === "login.html" || raw.endsWith("/login.html")) return "index.html";
          return raw;
        }
        form.addEventListener("submit", function (ev) {
          ev.preventDefault();
          err.classList.remove("visible");
          var login = document.getElementById("authLogin").value;
          var password = document.getElementById("authPass").value;
          if (login === EXPECTED_LOGIN && password === EXPECTED_PASSWORD) {
            try {
              sessionStorage.setItem("adDiagAuth", "1");
            } catch (e) {}
            var params = new URLSearchParams(location.search);
            var next = safeNext(params.get("next"));
            location.href = next;
          } else {
            err.classList.add("visible");
          }
        });
      })();
    </script>
  </body>
</html>
