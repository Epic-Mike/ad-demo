<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Demo Selfcode banner 300×250</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      width: 300px; height: 250px;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #0891b2 100%);
      cursor: pointer;
    }
    .wrap {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; padding: 16px; text-align: center; color: #fff;
    }
    .brand { font-weight: 800; font-size: 22px; letter-spacing: -0.02em; text-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .sub { margin-top: 8px; font-size: 13px; opacity: .92; max-width: 240px; line-height: 1.35; }
    .cta {
      margin-top: 14px; padding: 8px 18px; border-radius: 999px;
      background: #fff; color: #0d9488; font-weight: 800; font-size: 12px;
      border: none; box-shadow: 0 4px 14px rgba(0,0,0,.15);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <a class="wrap" href="https://example.com/demo" target="_blank" rel="noopener noreferrer">
    <div class="brand">Selfcode — демо</div>
    <p class="sub">Встав цей файл у вкладку Selfcode (весь код) або відкрий у браузері.</p>
    <span class="cta">Дізнатись більше</span>
  </a>
</body>
</html>
